name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install mcpb
        run: npm install -g @anthropic-ai/mcpb

      - name: Pack extension
        run: mcpb pack . gemini-youtube-transcriber-mcp-${{ github.ref_name }}.mcpb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gemini-youtube-transcriber-mcp-${{ github.ref_name }}.mcpb
          generate_release_notes: true
